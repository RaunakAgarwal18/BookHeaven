spring.application.name=USER-SERVICE
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.servlet.context-path=/

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/reactlibrarydatabase}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

api.gateway.url=http://localhost:8090
email.service.path = /api/email
email.service.url = http://EMAIL-SERVICE/api/email

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.private.key=${JWT_PRIVATE_KEY}
jwt.public.key=${JWT_PUBLIC_KEY}
jwt.expiration=86400000

server.port=8081
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.instance-id=${spring.application.name}:${server.port}

logging.level.com.bookheaven.user_service=DEBUG

frontend.url = ${FRONTEND_URL:http://localhost:5173}

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

password.reset.token.expiry.minutes=30
internal.service.secret = ${INTERNAL_SERVICE_SECRET}
gateway.communication.secret=${GATEWAY_COMMUNICATION_SECRET}

# Telemetry Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# ===== OAuth2 Configuration =====
# Google (https://console.cloud.google.com/ -> APIs & Services -> Credentials)
oauth2.google.client-id=${OAUTH2_GOOGLE_CLIENT_ID}
oauth2.google.client-secret=${OAUTH2_GOOGLE_CLIENT_SECRET}
oauth2.google.redirect-uri=${OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:5173/oauth2/callback}
oauth2.google.token-url=https://oauth2.googleapis.com/token
oauth2.google.userinfo-url=https://www.googleapis.com/oauth2/v2/userinfo

# ===== Internal Services =====
book.service.bulk-books-url=http://BOOK-SERVICE/api/book/internal/bulk-books

# ===== Distributed Tracing =====
management.tracing.sampling.probability=1.0
logging.pattern.correlation=[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}]


