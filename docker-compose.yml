version: '3.8'

networks:
  bookheaven-net:
    driver: bridge

volumes:
  mysql-data:
  elasticsearch-data:

services:
  # ==========================================
  # Infrastructure Services
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: reactlibrarydatabase
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bookheaven-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - bookheaven-net

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - bookheaven-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - bookheaven-net

  # ==========================================
  # Core / Registry Services
  # ==========================================
  eureka-server:
    build:
      context: ./eureka-server/server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - bookheaven-net

  api-gateway:
    build:
      context: ./api-gateway/gateway
    container_name: api-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
    ports:
      - "8090:8090"
    depends_on:
      - eureka-server
    networks:
      - bookheaven-net

  # ==========================================
  # Microservices
  # ==========================================
  user-service:
    build:
      context: ./user-service/user-service
    container_name: user-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/reactlibrarydatabase
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_REDIS_HOST=redis
    depends_on:
      - mysql
      - rabbitmq
      - redis
      - eureka-server
    networks:
      - bookheaven-net

  book-service:
    build:
      context: ./book-service/book-service
    container_name: book-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/reactlibrarydatabase
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_REDIS_HOST=redis
    depends_on:
      - mysql
      - rabbitmq
      - redis
      - eureka-server
    networks:
      - bookheaven-net

  cart-service:
    build:
      context: ./cart-service/cart-service
    container_name: cart-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/reactlibrarydatabase
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    networks:
      - bookheaven-net

  order-service:
    build:
      context: ./order-service/order-service
    container_name: order-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/reactlibrarydatabase
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    networks:
      - bookheaven-net

  payment-service:
    build:
      context: ./payment-service/payment-service
    container_name: payment-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/reactlibrarydatabase
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    networks:
      - bookheaven-net

  review-service:
    build:
      context: ./review-service/review-service
    container_name: review-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/reactlibrarydatabase
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    networks:
      - bookheaven-net

  search-service:
    build:
      context: ./search-service
    container_name: search-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
      - rabbitmq
      - eureka-server
    networks:
      - bookheaven-net

  email-service:
    build:
      context: ./email-service/email-service
    container_name: email-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
      - eureka-server
    networks:
      - bookheaven-net

  # ==========================================
  # Frontend
  # ==========================================
  bookstore-frontend:
    build:
      context: ./bookstore-frontend
    container_name: bookstore-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - bookheaven-net
