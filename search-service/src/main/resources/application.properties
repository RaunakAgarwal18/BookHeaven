spring.application.name=SEARCH-SERVICE
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.servlet.context-path=/

server.port=8088
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

jwt.public.key=${JWT_PUBLIC_KEY}
jwt.expiration=86400000

internal.service.secret=${INTERNAL_SERVICE_SECRET}
gateway.communication.secret=${GATEWAY_COMMUNICATION_SECRET}

# Telemetry Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0
logging.pattern.correlation=[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}]
